<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>SaaS 2</title>
<style>body{margin:0;font-family:Georgia,serif;background:#fffbeb;color:#1c1917}
header{display:flex;justify-content:space-between;padding:1.25rem 2rem;background:#fff;border-bottom:1px solid #e5e7eb}
.hero{padding:5rem 2rem;text-align:center}.hero h1{font-size:3rem;margin:0 0 1rem}
.hero p{max-width:36rem;margin:0 auto 1.5rem;opacity:.8}
.btn{display:inline-block;background:#f59e0b;color:#1c1917;padding:.85rem 1.4rem;border-radius:8px;text-decoration:none;font-weight:700;font-family:system-ui,sans-serif}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.25rem;max-width:1000px;margin:0 auto 4rem;padding:0 1.5rem}
.card{background:#fff;border-radius:14px;padding:1.5rem;box-shadow:0 8px 24px rgba(0,0,0,.06)}
@media(max-width:800px){.grid{grid-template-columns:1fr}}</style></head><body>
<header><strong>Brand 2</strong><nav>Product · Pricing · Login</nav></header>
<section class="hero"><h1>Ship with clarity</h1><p>Variant landing page 2 for fidelity regression.</p><a class="btn" href="#">Start free</a></section>
<section class="grid"><div class="card"><h3>Feature 1</h3><p>Supporting copy for card 1.</p></div><div class="card"><h3>Feature 2</h3><p>Supporting copy for card 2.</p></div><div class="card"><h3>Feature 3</h3><p>Supporting copy for card 3.</p></div></section>
</body></html>
