<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Grid 6</title>
<style>body{margin:0;font-family:system-ui,sans-serif;background:#fafafa}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;padding:1.5rem;max-width:1100px;margin:0 auto}
.cell{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:1.25rem;min-height:160px}
.cell.wide{grid-column:span 2}@media(max-width:700px){.grid{grid-template-columns:1fr}.cell.wide{grid-column:span 1}}</style></head><body>
<div class="grid"><div class="cell wide"><h1>Featured 6</h1><p>Wide tile</p></div>
<div class="cell"><h3>Cell 1</h3></div><div class="cell"><h3>Cell 2</h3></div><div class="cell"><h3>Cell 3</h3></div><div class="cell"><h3>Cell 4</h3></div></div></body></html>
